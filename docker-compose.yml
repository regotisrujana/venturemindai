services:
  postgres:
    image: postgres:16
    container_name: venturemind-postgres
    environment:
      POSTGRES_DB: venturemind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - venturemind-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d venturemind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  venturemind-postgres-data:
